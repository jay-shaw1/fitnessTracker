<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Workout</title>
        <link rel="stylesheet" href="../style.css">
    </head>

    <body>
        <nav>
            <h1>Fitness Track</h1>
            <a href="../index.html">Home ></a>
            <a href="workout.html"><b>Workout</b></a>
        </nav>

        <main>
            <h2>Enter today's workout split:</h2>
            <select id="workout-select" onchange="handleWorkoutChoice()">
                <option value="" disabled selected>Select workout split</option>
                <option value="Leg Day">Legs</option>
                <option value="Push Day">Push</option>
                <option value="Pull Day">Pull</option>
                <option value="Chest/Back Day">Chest and Back</option>
                <option value="Shoulders/Arms Day">Shoulders and Arms</option>
                <option value="other">Enter another split</option>
            </select>

            <input type="text" id="custom-workout" placeholder="Enter name of split/workout" style="display:none">
            <h2>How much time will you take:</h2>
            <input id="time-select" placeholder="Time (in minutes)">
            <button onclick="goToExercise()">Continue</button>

        </main>
        <script src="../js/api.js"></script>
        <script src="../js/app.js"></script>
    </body>
</html>
