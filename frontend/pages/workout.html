<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Workout</title>
        <link rel="stylesheet" href="../style.css">
    </head>

    <body>
        <nav>
            <h1>Fitness Track</h1>
            <a href="../index.html">Home</a>
        </nav>

        <main>
            <h2>Enter today's workout split:</h2>
            <select id="workout-select" onchange="handleWorkoutChoice()">
                <option value="" disabled selected>Select workout split</option>
                <option value="Legs">Legs</option>
                <option value="Push">Push</option>
                <option value="Pull">Pull</option>
                <option value="Chest and Back">Chest and Back</option>
                <option value="Push">Shoulders and Arms</option>
                <option value="other">Enter another split</option>
            </select>

            <input type="text" id="custom-workout" placeholder="Enter name of split/workout" style="display:none">
            <button onclick="window.location.href='exercise.html'">Continue</button>

        </main>
        <script src="../js/api.js"></script>
        <script src="../js/app.js"></script>
    </body>
</html>
