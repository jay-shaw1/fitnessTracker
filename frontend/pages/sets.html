<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sets</title>
        <link rel="stylesheet" href="../style.css">
    </head>

    <body onload="loadSetsPage()">
        <nav>
            <h1>Fitness Track</h1>
            <a href="../index.html">Home ></a>
            <a href="workout.html">Workout ></a>
            <a href="exercise.html">Exercise ></a>
            <a href="sets.html"><b>Sets</b></a>
        </nav>

        <main>
            <h2 id="workout-title"></h2>
            <h3 id="exercise-title"></h3>
            <h4 id="sets-counter">Set 1</h4>

            <div id="set-input">
                <input type="number" id="reps" placeholder="Reps">
                <input type="number" id="weight" placeholder="Weight (lbs)">
                <button onclick="saveSet()">Save Set</button>
            </div>
            
            <p id="message"></p>

            <div id="finish-buttons">
                <button onclick="saveAndContinue('end')">End Workout</button>
                <button onclick="saveAndContinue('exercise')">Add Another Exercise</button>
            </div>
        </main>

        <script src="../js/api.js"></script>
        <script src="../js/app.js"></script>
    </body>
</html>
