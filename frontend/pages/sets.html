<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sets — JFit</title>
        <link rel="stylesheet" href="../style.css">
    </head>

    <body onload="loadSetsPage()">
        <nav>
            <h1>JFit</h1>
            <a href="../index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="#" id="logout-link" onclick="logout()" style="display:none">Logout</a>
        </nav>

        <div class="flow-bar">
            <div class="flow-step flow-step--done">
                <span class="flow-step__num">01</span>
                <span class="flow-step__label">Choose Split</span>
            </div>
            <div class="flow-connector flow-connector--done"></div>
            <div class="flow-step flow-step--done">
                <span class="flow-step__num">02</span>
                <span class="flow-step__label">Log Exercise</span>
            </div>
            <div class="flow-connector flow-connector--done"></div>
            <div class="flow-step flow-step--active">
                <span class="flow-step__num">03</span>
                <span class="flow-step__label">Track Sets</span>
            </div>
        </div>

        <main>
           
            <p class="sets-context">
                <span class="eyebrow-dot-sm"></span>
                <span id="workout-title"></span>
            </p>

            <h2 id="exercise-title"></h2>

           
            <div id="sets-counter">Set 1</div>

            <div id="set-input">
                <div class="set-row">
                    <div class="input-group">
                        <label class="input-label">Reps</label>
                        <input type="number" id="reps" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Weight<span class="input-unit">(lbs)</span></label>
                        <input type="number" id="weight" placeholder="0">
                    </div>
                </div>
                <button onclick="saveSet()">Log Set</button>
            </div>

            <div id="sets-log" class="sets-log"></div>

            <div id="finish-buttons">
                <button onclick="saveAndContinue('end')">End Workout</button>
                <button onclick="saveAndContinue('exercise')">Add Another Exercise</button>
            </div>

            <p id="message"></p>
        </main>

        <!-- Confirmation Modal -->
        <div id="confirm-modal" class="modal-overlay" style="display:none">
            <div class="modal">
                <p class="modal-message" id="modal-message"></p>
                <div class="modal-actions">
                    <button class="modal-confirm" id="modal-confirm-btn">Confirm</button>
                    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>

        <script src="../js/api.js"></script>
        <script src="../js/app.js"></script>
    </body>
</html>
