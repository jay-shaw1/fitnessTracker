<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sets</title>
        <link rel="stylesheet" href="../style.css">
    </head>

    <body onload="loadSetsPage()">
        <nav>
            <h1>Fitness Track</h1>
            <a href="../index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>

        <main>
            <h2 id="workout-title"></h2>
            <h2 id="exercise-title"></h2>
            <div id="sets-counter">Set 1</div>

            <div id="set-input">
                <div class="set-row">
                    <input type="number" id="reps" placeholder="Reps">
                    <input type="number" id="weight" placeholder="Weight (lbs)">
                </div>
                <button onclick="saveSet()">Save Set</button>
            </div>

            <div id="finish-buttons">
                <button onclick="saveAndContinue('end')">End Workout</button>
                <button onclick="saveAndContinue('exercise')">Add Another Exercise</button>
            </div>

            <p id="message"></p>
        </main>

        <script src="../js/api.js"></script>
        <script src="../js/app.js"></script>
    </body>
</html>
