<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Exercise — JFit</title>
        <link rel="stylesheet" href="../style.css">
    </head>

    <body onload="loadExercisePage()">
        <nav id="nav">
            <h1>JFit</h1>
            <a href="../index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="#" id="logout-link" onclick="logout()" style="display:none">Logout</a>
        </nav>

        <div class="flow-bar">
            <div class="flow-step flow-step--done">
                <span class="flow-step__num">01</span>
                <span class="flow-step__label">Choose Split</span>
            </div>
            <div class="flow-connector flow-connector--done"></div>
            <div class="flow-step flow-step--active">
                <span class="flow-step__num">02</span>
                <span class="flow-step__label">Log Exercise</span>
            </div>
            <div class="flow-connector"></div>
            <div class="flow-step">
                <span class="flow-step__num">03</span>
                <span class="flow-step__label">Track Sets</span>
            </div>
        </div>

        <main>
            
            <p class="page-eyebrow">
                <span class="eyebrow-dot-sm"></span>
                <span id="workout-title"></span>
            </p>

            <h2>Choose an<br>Exercise</h2>

            <p class="field-label">Exercise name:</p>

            <input id="exercise-name"
                   placeholder="e.g. Squat, Bench Press, Deadlift...">

            <div class="quick-picks">
                <span class="quick-pick-label">Quick pick:</span>
                <button type="button" class="chip" onclick="setExercise('Squat')">Squat</button>
                <button type="button" class="chip" onclick="setExercise('Bench Press')">Bench</button>
                <button type="button" class="chip" onclick="setExercise('Deadlift')">Deadlift</button>
                <button type="button" class="chip" onclick="setExercise('Push Ups')">Push Ups</button>
                <button type="button" class="chip" onclick="setExercise('Pull Ups')">Pull Ups</button>
                <button type="button" class="chip" onclick="setExercise('Dips')">Dips</button>
            </div>

            <button onclick="createExercise()">Continue</button>

            <p id="message"></p>
        </main>

        <!-- Confirmation Modal -->
        <div id="confirm-modal" class="modal-overlay" style="display:none">
            <div class="modal">
                <p class="modal-message" id="modal-message"></p>
                <div class="modal-actions">
                    <button class="modal-confirm" id="modal-confirm-btn">Confirm</button>
                    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>

        <script src="../js/api.js"></script>
        <script src="../js/app.js"></script>
    </body>
</html>
