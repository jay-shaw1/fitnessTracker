<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sign In — JFit</title>
        <link rel="stylesheet" href="../style.css">
    </head>

    <body onload="loadLogin()">
        <nav>
            <h1>JFit</h1>
            <a href="../index.html">Home</a>
        </nav>

        <main class="auth-main">

            <p class="page-eyebrow">
                <span class="eyebrow-dot-sm"></span>
                Welcome Back
            </p>

            <h2>Sign In</h2>

            <p class="auth-sub">Pick up where you left off.</p>

            <div id="signin-form" class="auth-form">
                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input type="email" id="email" placeholder="you@email.com">
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button onclick="signIn()">Sign In</button>
            </div>

            <a href="signup.html" class="auth-switch">
                No account yet? <span>Create one →</span>
            </a>

            <p id="message"></p>
        </main>

        <script src="../js/api.js"></script>
        <script src="../js/app.js"></script>
    </body>
</html>
